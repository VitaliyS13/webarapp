<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Мультимаркерна WebAR Система</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="margin: 0; overflow: hidden;">

<div id="ui-container">
    <h1>WebAR Мультимаркерна Платформа</h1>
    <p>Наведіть камеру на маркери <strong>Hiro</strong> або <strong>Kanji</strong></p>
    <div id="status-panel">Статус: Очікування маркерів...</div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" vr-mode-ui="enabled: false">

    <a-marker preset="hiro" id="marker-hiro">
        <a-box id="box-hiro" position="0 0.5 0" material="color: red; opacity: 0.8; roughness: 0.3;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
        </a-box>
    </a-marker>

    <a-marker preset="kanji" id="marker-kanji">
        <a-sphere id="sphere-kanji" position="0 0.5 0" radius="0.5" material="color: blue; opacity: 0.8; roughness: 0.3;"
                  animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
        </a-sphere>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script src="js/scene.js"></script>
<script src="js/markers.js"></script>
<script src="js/interaction.js"></script>
<script src="js/app.js"></script>
</body>
</html>
